<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/bulma/css/bulma.css">
    <script src="todo.js" defer></script>
    <title>Lista de Tareas</title>
</head>
<body>
    <section class="hero has-text-centered has-background-black-ter has-text-white-ter">
        <div class="hero-body">

            <span class="has-text-weight-bold is-size-3">Lista de Tareas</span>
            <div class="columns is-centered">
                <div class="column is-half">
                    <div class="field has-addons">
                        <div class="control is-expanded">
                            <input type="text" id="tarea" class="input is-rounded" placeholder="¿Qué haras hoy?" required />
                        </div>
                        <div class="control">
                            <button id="agregar" class="button is-light">
                                Agregar
                            </button>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </section>
    
    <section class="section is-large has-background-black-bis has-text-white-ter">
    <div class="columns is-multiline" id="tareas"></div>
    <p class="has-text-centered is-size-3 has-text-weight-bold" id="notifier">¡No hay nada! Aún... 😅</p>
    </section>
</div>
    
</body>
</html>
